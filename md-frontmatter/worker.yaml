name: md-frontmatter
description: 为指定目录下的所有 .md 文件递归添加 YAML frontmatter 元数据（LLM 生成 title/date/tags）
language: python
log_retention_days: 7
schedule:
  enabled: true
  cron: "* * * * *"
  job_options:
    misfire_grace_time: 60
    coalesce: true
    max_instances: 1
run: "python main.py"

# 非保密配置（保密/隐私配置在 .env 中）
min_content_length: 200
draft_markers:
  - "<!-- draft -->"
  - "<!-- wip -->"
  - "!draft"
  - "!wip"
