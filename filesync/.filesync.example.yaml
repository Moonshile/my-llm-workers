# 文件同步组配置示例
# 将此文件复制为 .filesync.yaml 并修改为你的实际路径
# .filesync.yaml 已被 .gitignore 忽略，不会提交到版本管理

groups:
  - name: "zshrc"
    paths:
      - "~/.zshrc"
      - "~/dotfiles/zsh/.zshrc"

  - name: "git-config"
    paths:
      - "~/.gitconfig"
      - "~/dotfiles/git/.gitconfig"

  # - name: "another-group"
  #   paths:
  #     - "/path/to/file1.txt"
  #     - "/path/to/file2.txt"
  #     - "/path/to/file3.txt"

  # 目录级同步：指定 pattern 后所有 paths 视为目录，
  # 按通配符匹配目录内文件，跨目录按文件名匹配后同步
